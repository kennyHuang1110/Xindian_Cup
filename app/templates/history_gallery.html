{% extends "base_dimension.html" %}

{% block title %}{{ app_name }} | 歷屆照片{% endblock %}

{% block header_inner %}
<h1>歷屆照片</h1>
<p>保留每一屆新店盃的現場紀錄，延續活動記憶與球場氛圍。</p>
{% endblock %}

{% block main %}
<article id="photos" class="active article-static article-wide">
    <h2 class="major">歷屆照片</h2>
    <div class="dimension-gallery-grid">
        {% for photo in gallery_photos %}
            <figure class="dimension-gallery-card">
                <span class="image fit dimension-gallery-image">
                    <img src="{{ url_for('gallery', path=photo.file) }}" alt="新店盃排球賽 {{ photo.year }} 年照片" loading="lazy" />
                </span>
                <figcaption>
                    <strong>{{ photo.year }}</strong>
                    <p>{{ photo.caption }}</p>
                </figcaption>
            </figure>
        {% endfor %}
    </div>
</article>
{% endblock %}
